<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>কৃষক বাজার (Krishok Bazar) - সতেজ ফসলের বাজার</title>
    
    <!-- PWA & Android Meta Tags -->
    <meta name="theme-color" content="#059669" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="shortcut icon" href="/icon-192.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Krishok Bazar" />
    <meta name="description" content="Premium direct-to-farmer Bangladeshi agricultural marketplace. Real-time safe food direct from source." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Register Service Worker for Offline Caching and Push Notifications -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('ServiceWorker registered successfully with scope: ', registration.scope);
            })
            .catch((err) => {
              console.error('ServiceWorker registration failed: ', err);
            });
        });
      }
    </script>
  </body>
</html>
